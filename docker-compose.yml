services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aphrodite
      POSTGRES_PASSWORD: aphrodite_dev
      POSTGRES_DB: aphrodite
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
